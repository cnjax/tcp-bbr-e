# DKMS config for the bbr_e congestion-control module (tcp_bbr_e.ko).
# Synced by deploy_dkms.sh to /usr/src/tcp-bbr-e-<version>/ on the server.
# AUTOINSTALL makes dkms rebuild the module automatically when the server
# boots a new kernel — the reason this packaging exists (extra/-installed
# kos silently die on kernel upgrades).
# Bump PACKAGE_VERSION when algorithm behavior changes (matches the
# development round in debian_bbr_v3/用户需求.md).
PACKAGE_NAME="tcp-bbr-e"
PACKAGE_VERSION="14.1"
BUILT_MODULE_NAME[0]="tcp_bbr_e"
DEST_MODULE_LOCATION[0]="/updates/dkms"
MAKE[0]="make KERNEL_RELEASE=${kernelver} KERNEL_DIR=${kernel_source_dir}"
CLEAN="make KERNEL_RELEASE=${kernelver} KERNEL_DIR=${kernel_source_dir} clean"
AUTOINSTALL="yes"
